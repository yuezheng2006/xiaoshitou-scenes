# Xiaoshitou Scenes Workflow Add Or Update Persona Assets And Metadata

## Action

Follow the add-or-update-persona-assets-and-metadata workflow:
1. Add or update image assets under scene-skill-core/ip-profiles/[persona]/assets/persona/
2. Update or create persona metadata files: persona-author-assets.md, persona-author-identity.md, persona-author-prompts.md, persona-author.md
3. Update or create references: references/common-character-lock.md, references/common-prompt-slots.md, references/persona-quick-checklist.md
4. Optionally update QUICK-START.md to reflect new persona or changes

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: scene-skill-core/ip-profiles/*/assets/persona/*.png, scene-skill-core/ip-profiles/*/persona-author-assets.md, scene-skill-core/ip-profiles/*/persona-author-identity.md

