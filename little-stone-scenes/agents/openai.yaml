  default_prompt: "默认根据内容自动选择小石头实物图或小石头手绘图；用户明确说知识卡/手机海报或 PPT/课件/演讲页面时才进入知识卡模式或 PPT 演讲模式。无论哪种模式，都保持 #f39200 胶囊体、白圆眼、物理/概念动作和短中文标签；实物图/手绘图还必须保持充足留白。"
policy:
  allow_implicit_invocation: true
